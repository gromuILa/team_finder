{% if page_obj.has_other_pages %}
<nav class="pagination">
    {% if page_obj.has_previous %}
        <a href="?page={{ page_obj.previous_page_number }}" class="pagination__link pagination__link--prev">&laquo; Назад</a>
    {% endif %}
    <span class="pagination__info">
        Страница {{ page_obj.number }} из {{ page_obj.paginator.num_pages }}
    </span>
    {% if page_obj.has_next %}
        <a href="?page={{ page_obj.next_page_number }}" class="pagination__link pagination__link--next">Вперёд &raquo;</a>
    {% endif %}
</nav>
{% endif %}
